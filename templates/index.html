<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThreatMap — AI Intelligence Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #06080d;
    --surface: #0d1117;
    --surface2: #161b22;
    --border: #21262d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --warn: #f0883e;
    --danger: #f85149;
    --text: #e6edf3;
    --muted: #8b949e;
    --critical: #ff4444;
    --high: #f0883e;
    --medium: #e3b341;
    --low: #3fb950;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(13,17,23,0.9);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Main layout */
  main {
    display: grid;
    grid-template-columns: 340px 1fr;
    grid-template-rows: auto 1fr;
    height: calc(100vh - 56px);
  }

  /* Search panel */
  .search-panel {
    grid-column: 1 / -1;
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--surface);
  }

  .search-label {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .search-wrapper {
    flex: 1;
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 1rem 0.6rem 2.5rem;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
  }

  .analyze-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 0.6rem 1.5rem;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.03em;
  }

  .analyze-btn:hover { opacity: 0.9; }
  .analyze-btn:active { transform: scale(0.98); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Side panel */
  .side-panel {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--surface);
  }

  .side-panel::-webkit-scrollbar { width: 4px; }
  .side-panel::-webkit-scrollbar-track { background: transparent; }
  .side-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Viz panel */
  .viz-panel {
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  /* Panel sections */
  .panel-section {
    padding: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 0.75rem;
  }

  /* Risk meter */
  .risk-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }

  .risk-badge {
    font-size: 11px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    padding: 3px 10px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  .risk-CRITICAL { background: rgba(255,68,68,0.15); color: var(--critical); border: 1px solid rgba(255,68,68,0.3); }
  .risk-HIGH { background: rgba(240,136,62,0.15); color: var(--high); border: 1px solid rgba(240,136,62,0.3); }
  .risk-MEDIUM { background: rgba(227,179,65,0.15); color: var(--medium); border: 1px solid rgba(227,179,65,0.3); }
  .risk-LOW { background: rgba(63,185,80,0.15); color: var(--low); border: 1px solid rgba(63,185,80,0.3); }

  .risk-score {
    font-size: 28px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
  }

  .risk-bar-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    margin-top: 8px;
    overflow: hidden;
  }

  .risk-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s ease;
  }

  /* Summary */
  .summary-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
  }

  /* Findings */
  .finding-item {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    margin-bottom: 0.5rem;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .finding-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 6px;
    flex-shrink: 0;
  }

  /* Entity list */
  .entity-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .entity-item:last-child { border-bottom: none; }

  .entity-type-pill {
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 500;
    letter-spacing: 0.05em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .type-PERSON { background: rgba(88,166,255,0.15); color: #58a6ff; }
  .type-ORGANIZATION { background: rgba(63,185,80,0.15); color: #3fb950; }
  .type-LOCATION { background: rgba(240,136,62,0.15); color: #f0883e; }
  .type-EVENT { background: rgba(188,140,255,0.15); color: #bc8cff; }
  .type-FINANCIAL { background: rgba(227,179,65,0.15); color: #e3b341; }

  .entity-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Actions */
  .action-item {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    margin-bottom: 0.5rem;
  }

  .action-num {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 1px;
  }

  .action-text {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* News */
  .news-item {
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .news-item:last-child { border-bottom: none; }

  .news-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 3px;
  }

  .news-meta {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
  }

  /* Graph */
  #graph-container {
    width: 100%;
    height: 100%;
  }

  svg {
    width: 100%;
    height: 100%;
  }

  .node circle {
    stroke-width: 2;
    cursor: pointer;
    transition: r 0.2s;
  }

  .node:hover circle { filter: brightness(1.3); }

  .node text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    fill: #e6edf3;
    pointer-events: none;
    text-anchor: middle;
  }

  .link {
    stroke: rgba(255,255,255,0.12);
    stroke-width: 1.5;
    fill: none;
    marker-end: url(#arrow);
  }

  .link-label {
    font-size: 9px;
    fill: #8b949e;
    text-anchor: middle;
    pointer-events: none;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Tooltip */
  .tooltip {
    position: absolute;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    max-width: 200px;
    z-index: 50;
  }

  .tooltip.visible { opacity: 1; }

  .tooltip-name {
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .tooltip-desc {
    color: var(--muted);
    line-height: 1.5;
  }

  /* Loading state */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(6,8,13,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    z-index: 20;
  }

  .loading-overlay.active { display: flex; }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    animation: blink 1.2s steps(1) infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Empty state */
  .empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .empty-text {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    opacity: 0.6;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">⬡</div>
      THREATMAP <span style="color:var(--muted); font-weight:300;">// OSINT Intelligence</span>
    </div>
    <div class="status-bar">
      <div class="status-dot"></div>
      SYSTEMS OPERATIONAL
    </div>
  </header>

  <main>
    <div class="search-panel">
      <span class="search-label">// TARGET</span>
      <div class="search-wrapper">
        <span class="search-icon">⌕</span>
        <input class="search-input" id="searchInput" type="text" placeholder="Enter person, organization, entity, or keyword...">
      </div>
      <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()">ANALYZE</button>
    </div>

    <aside class="side-panel" id="sidePanel">
      <div style="padding: 2rem; color: var(--muted); font-size: 12px; font-family: 'JetBrains Mono', monospace; text-align: center; opacity: 0.5;">
        Enter a target query to begin intelligence analysis...
      </div>
    </aside>

    <div class="viz-panel" id="vizPanel">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">⬡</div>
        <div class="empty-text">AWAITING QUERY INPUT</div>
      </div>
      <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">ANALYZING INTELLIGENCE SOURCES...</div>
      </div>
      <div id="graph-container"></div>
      <div class="tooltip" id="tooltip">
        <div class="tooltip-name" id="tooltipName"></div>
        <div class="tooltip-desc" id="tooltipDesc"></div>
      </div>
    </div>
  </main>
</div>

<script>
const TYPE_COLORS = {
  PERSON: '#58a6ff',
  ORGANIZATION: '#3fb950',
  LOCATION: '#f0883e',
  EVENT: '#bc8cff',
  FINANCIAL: '#e3b341',
};

let simulation = null;

function getRiskColor(level) {
  return { CRITICAL: '#ff4444', HIGH: '#f0883e', MEDIUM: '#e3b341', LOW: '#3fb950' }[level] || '#8b949e';
}

async function runAnalysis() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('loadingOverlay').classList.add('active');
  document.getElementById('graph-container').innerHTML = '';

  try {
    const resp = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });
    const data = await resp.json();
    renderResults(data);
  } catch (e) {
    alert('Analysis failed. Check console for details.');
    console.error(e);
  } finally {
    document.getElementById('loadingOverlay').classList.remove('active');
    document.getElementById('analyzeBtn').disabled = false;
  }
}

function renderResults(data) {
  renderSidePanel(data);
  renderGraph(data);
}

function renderSidePanel(data) {
  const riskColor = getRiskColor(data.risk_level);
  const panel = document.getElementById('sidePanel');

  const newsList = (data.articles || []).map(a => `
    <div class="news-item">
      <div class="news-title">${a.title || 'Untitled'}</div>
      <div class="news-meta">${a.source || 'Unknown'}</div>
    </div>`).join('');

  const findingsList = (data.key_findings || []).map(f => `
    <div class="finding-item"><div class="finding-dot"></div><span>${f}</span></div>`).join('');

  const entityList = (data.entities || []).map(e => `
    <div class="entity-item">
      <span class="entity-type-pill type-${e.type}">${e.type}</span>
      <span class="entity-label">${e.label}</span>
    </div>`).join('');

  const actionList = (data.recommended_actions || []).map((a, i) => `
    <div class="action-item">
      <div class="action-num">${i + 1}</div>
      <div class="action-text">${a}</div>
    </div>`).join('');

  panel.innerHTML = `
    <div class="panel-section">
      <div class="section-title">// Risk Assessment</div>
      <div class="risk-header">
        <div class="risk-score">${data.risk_score}<span style="font-size:14px;color:var(--muted)">/100</span></div>
        <span class="risk-badge risk-${data.risk_level}">${data.risk_level}</span>
      </div>
      <div class="risk-bar-track">
        <div class="risk-bar-fill" style="width:${data.risk_score}%;background:${riskColor}"></div>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-title">// Intelligence Summary</div>
      <p class="summary-text">${data.summary}</p>
    </div>

    <div class="panel-section">
      <div class="section-title">// Key Findings</div>
      ${findingsList}
    </div>

    <div class="panel-section">
      <div class="section-title">// Entities (${(data.entities || []).length})</div>
      ${entityList}
    </div>

    <div class="panel-section">
      <div class="section-title">// Recommended Actions</div>
      ${actionList}
    </div>

    <div class="panel-section">
      <div class="section-title">// Source Articles</div>
      ${newsList || '<div style="font-size:12px;color:var(--muted)">No articles fetched (add NEWS_API_KEY)</div>'}
    </div>`;
}

function renderGraph(data) {
  const container = document.getElementById('graph-container');
  const W = container.clientWidth;
  const H = container.clientHeight;

  const nodes = (data.entities || []).map(e => ({ id: e.id, label: e.label, type: e.type, description: e.description }));
  const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));
  const links = (data.relationships || [])
    .filter(r => nodeMap[r.source] && nodeMap[r.target])
    .map(r => ({ ...r, source: r.source, target: r.target }));

  const svg = d3.select('#graph-container').append('svg')
    .attr('width', W).attr('height', H);

  // Arrow marker
  svg.append('defs').append('marker')
    .attr('id', 'arrow').attr('viewBox', '0 -5 10 10')
    .attr('refX', 22).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', 'rgba(255,255,255,0.2)');

  if (simulation) simulation.stop();

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(120))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide(40));

  const link = svg.append('g').selectAll('.link').data(links).join('line')
    .attr('class', 'link')
    .style('stroke-width', d => Math.max(1, d.strength * 0.5));

  const linkLabel = svg.append('g').selectAll('.link-label').data(links).join('text')
    .attr('class', 'link-label').text(d => d.label);

  const tooltip = document.getElementById('tooltip');
  const tooltipName = document.getElementById('tooltipName');
  const tooltipDesc = document.getElementById('tooltipDesc');

  const node = svg.append('g').selectAll('.node').data(nodes).join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    )
    .on('mouseover', (event, d) => {
      tooltipName.textContent = d.label;
      tooltipDesc.textContent = d.description || d.type;
      tooltip.classList.add('visible');
    })
    .on('mousemove', (event) => {
      const rect = container.getBoundingClientRect();
      tooltip.style.left = (event.clientX - rect.left + 12) + 'px';
      tooltip.style.top = (event.clientY - rect.top - 40) + 'px';
    })
    .on('mouseout', () => tooltip.classList.remove('visible'));

  node.append('circle')
    .attr('r', (d, i) => i === 0 ? 22 : 14)
    .attr('fill', d => TYPE_COLORS[d.type] + '22')
    .attr('stroke', d => TYPE_COLORS[d.type]);

  node.append('text')
    .attr('dy', 30)
    .text(d => d.label.length > 14 ? d.label.slice(0, 12) + '…' : d.label);

  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    linkLabel
      .attr('x', d => (d.source.x + d.target.x) / 2)
      .attr('y', d => (d.source.y + d.target.y) / 2);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') runAnalysis();
});
</script>
</body>
</html>
